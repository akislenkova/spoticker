AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Creates a read-only IAM role that Spoticker can assume to fetch
  Spot Placement Scores on your behalf.

Parameters:
  SpotickerRoleArn:
    Type: String
    Description: >
      Spoticker principal allowed to assume this role.
      Use arn:aws:iam::ACCOUNT_ID:role/SpotickerAssumeRole if that role exists,
      or arn:aws:iam::ACCOUNT_ID:root for initial setup (same External ID still required).
    AllowedPattern: "^arn:aws:iam::[0-9]{12}:.+$"
  ExternalId:
    Type: String
    Description: Your unique External ID from Spoticker (copy exactly)
    MinLength: 1

Resources:
  SpotickerRole:
    Type: AWS::IAM::Role
    Properties:
      # No fixed RoleName — avoids CREATE_FAILED on stack retries
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref SpotickerRoleArn
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      Policies:
        - PolicyName: SpotickerReadOnly
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:GetSpotPlacementScores
                Resource: "*"

Outputs:
  RoleArn:
    Description: Paste this ARN back into Spoticker
    Value: !GetAtt SpotickerRole.Arn
